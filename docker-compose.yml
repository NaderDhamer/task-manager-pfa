version: '3.8'

services:
  postgres-users:
    image: postgres:15
    environment:
      POSTGRES_DB: usersdb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d usersdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-tasks:
    image: postgres:15
    environment:
      POSTGRES_DB: tasksdb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d tasksdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  user-service:
    build: ./user-service
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://user:password@postgres-users:5432/usersdb
    depends_on:
      postgres-users:
        condition: service_healthy

  task-service:
    build: ./task-service
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: postgres://user:password@postgres-tasks:5432/tasksdb
    depends_on:
      postgres-tasks:
        condition: service_healthy
      user-service:
        condition: service_started

  ui:
    build: ./ui
    ports:
      - "3000:3000"
    depends_on:
      user-service:
        condition: service_started
      task-service:
        condition: service_started