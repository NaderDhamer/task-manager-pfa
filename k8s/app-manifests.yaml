---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  labels:
    app: postgres
data:
  USERS_DB_HOST: postgres-users
  USERS_DB_NAME: usersdb
  TASKS_DB_HOST: postgres-tasks
  TASKS_DB_NAME: tasksdb
  DB_USER: postgres

---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-users-secret
  labels:
    app: postgres-users
type: Opaque
stringData:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: usersdb

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-users
  labels:
    app: postgres-users
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-users
  template:
    metadata:
      labels:
        app: postgres-users
    spec:
      containers:
        - name: postgres-users
          image: postgres:15
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-users-secret
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U postgres
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U postgres
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: postgres-data
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-users
  labels:
    app: postgres-users
spec:
  type: ClusterIP
  selector:
    app: postgres-users
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP

---
